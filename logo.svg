<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="neon_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="#0F172A" stroke="url(#neon_grad)" stroke-width="4" filter="url(#glow)"/>
  <path d="M 60 140 L 100 60 L 140 140" stroke="url(#neon_grad)" stroke-width="8" fill="none" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="100" cy="45" r="10" fill="#00FFAA" filter="url(#glow)"/>
  <path d="M 60 110 L 140 110" stroke="url(#neon_grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
</svg>
